[pytest]
testpaths = real_proj/mvp/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default: run fast unit tests only (skip integration + slow + llm)
addopts = -v --tb=short -m "not slow and not llm"

markers =
    integration: tests that hit PubChem API or ORD SQLite database
    slow: tests that load the 192 MB ASKCOS retro model
    llm: tests that make real LLM API calls via OpenRouter

# Output
log_cli = true
log_cli_level = WARNING
